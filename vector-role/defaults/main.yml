---
vector_version: "0.38.0"
vector_arch: "amd64"
vector_package_url: "https://packages.timber.io/vector/{{ vector_version }}/vector_{{ vector_version }}-1_{{ vector_arch }}.deb"

vector_config_dir: "/etc/vector"
