---
- name: Install Vector dependencies
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
    state: present
    update_cache: true
  become: true

- name: Download Vector deb package
  ansible.builtin.get_url:
    url: "{{ vector_package_url }}"
    dest: "/tmp/vector_{{ vector_version }}.deb"
    mode: "0644"
  become: true

- name: Install Vector package
  ansible.builtin.apt:
    deb: "/tmp/vector_{{ vector_version }}.deb"
    state: present
  become: true

- name: Create Vector config directory
  ansible.builtin.file:
    path: "{{ vector_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy Vector config
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: "{{ vector_config_file }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart Vector

- name: Enable and start Vector
  ansible.builtin.service:
    name: "{{ vector_service_name }}"
    state: started
    enabled: true
  become: true
